name: Homebrew tap tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  audit:
    name: Audit formula
    runs-on: macos-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula
        run: |
          brew tap horus-ci/tap "$PWD"
          brew audit --strict horus-ci/tap/horus
          brew untap horus-ci/tap 2>/dev/null || true

  test:
    name: Install and test formula
    runs-on: macos-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Download release archives for local testing
        run: |
          set -euo pipefail
          VERSION=$(ruby -e "puts File.read('Formula/horus.rb').match(/version \"([^\"]+)\"/)[1]")
          mkdir -p .homebrew-archives
          for platform in darwin-arm64 darwin-x86_64 linux-arm64 linux-x86_64; do
            curl -fsSL \
              "https://github.com/meritt-dev/horus/releases/download/v${VERSION}/horus-v${VERSION}-${platform}.tar.gz" \
              -o ".homebrew-archives/horus-v${VERSION}-${platform}.tar.gz"
          done

      - name: Create temporary test tap with local archives
        run: |
          set -euo pipefail
          mkdir -p /tmp/horus-test-tap/Formula
          VERSION=$(ruby -e "puts File.read('Formula/horus.rb').match(/version \"([^\"]+)\"/)[1]")
          sed "s|https://github.com/meritt-dev/horus/releases/download/v${VERSION}/|file://$(pwd)/.homebrew-archives/|g" \
            Formula/horus.rb > /tmp/horus-test-tap/Formula/horus.rb
          cd /tmp/horus-test-tap
          git init -q
          git add .
          git commit -q -m "ci test tap"

      - name: Install formula from local tap
        run: |
          brew tap horus-local/test /tmp/horus-test-tap
          brew install --build-from-source horus-local/test/horus

      - name: Test formula
        run: brew test horus-local/test/horus
