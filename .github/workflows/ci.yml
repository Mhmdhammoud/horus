name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      # The source-intelligence HTTP contract tests (packages/connectors/src/source/contract.test.ts)
      # auto-skip when no host is reachable at HORUS_SOURCE_HOST_URL, so CI passes without a
      # live source-intelligence backend; to exercise them, run with a backend and HORUS_SOURCE_HOST_URL set.
      - run: pnpm test

      - run: pnpm build

      # CLI smoke gate (HOR-96): verify the built artifact starts correctly and
      # outputs expected content without requiring live Postgres or a source-intelligence backend.
      # Run with bash to avoid relying on execute permission in CI checkout.
      - name: CLI smoke test
        run: bash ./scripts/smoke-test.sh apps/horus/dist/index.cjs
