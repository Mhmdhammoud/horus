name: Release

# Manual release — not every push to master is a release. Reads the version from
# apps/horus/package.json and skips if a GitHub Release for that version already
# exists, so each step is idempotent.
#
# To release: bump apps/horus/package.json, commit + push to master, then run this
# workflow manually:
#   - GitHub UI: Actions → Release → "Run workflow"
#   - CLI:       gh workflow run Release --repo meritt-dev/horus
# HORUS_VERSION is injected from package.json at build time.
#
# Required secrets:
#   npm_token          — npm publish token (access: public)
#   HOMEBREW_TAP_TOKEN — GitHub PAT with write access to meritt-dev/homebrew-tap

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    # Only ever release from master — a workflow_dispatch can target any ref, and this
    # job holds npm + Homebrew publish secrets. Guard so a dispatch against any other
    # branch/tag is a no-op rather than publishing from unreviewed code.
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "const p=JSON.parse(require('fs').readFileSync('apps/horus/package.json','utf8')); process.stdout.write(p.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $RELEASE_TAG already published — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Typecheck
        if: steps.check.outputs.exists == 'false'
        run: pnpm typecheck

      - name: Test
        if: steps.check.outputs.exists == 'false'
        run: pnpm test

      - name: Stamp source-py version (one bundle, one version)
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - "$RELEASE_VERSION" packages/source-py <<'PYEOF'
          import re, sys
          version, src = sys.argv[1], sys.argv[2]
          pp = f"{src}/pyproject.toml"
          t = open(pp).read()
          t, n = re.subn(r'^version = "[^"]+"', f'version = "{version}"', t, count=1, flags=re.M)
          assert n == 1
          open(pp, "w").write(t)
          lock = f"{src}/uv.lock"
          t = open(lock).read()
          t, n = re.subn(r'(name = "horus-source"\nversion = ")[^"]+(")', rf'\g<1>{version}\g<2>', t, count=1)
          assert n == 1
          open(lock, "w").write(t)
          PYEOF

      - uses: astral-sh/setup-uv@v5
        if: steps.check.outputs.exists == 'false'

      - name: Build bundled source-intelligence wheel
        if: steps.check.outputs.exists == 'false'
        run: bash ./scripts/release/build-source-wheel.sh

      - name: Build CLI
        if: steps.check.outputs.exists == 'false'
        run: pnpm --filter ./apps/horus build

      - name: Assert bundled wheel is in dist
        if: steps.check.outputs.exists == 'false'
        run: test -f apps/horus/dist/horus_source.whl

      - name: Smoke test
        if: steps.check.outputs.exists == 'false'
        run: bash ./scripts/smoke-test.sh apps/horus/dist/index.cjs

      - name: Build platform archives (Homebrew)
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: bash ./scripts/homebrew/build-archives.sh "$RELEASE_VERSION" apps/horus/dist/index.cjs

      - name: Prepare install.sh artifact
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          cp apps/horus/dist/index.cjs "apps/horus/dist/horus-${RELEASE_TAG}"
          chmod +x "apps/horus/dist/horus-${RELEASE_TAG}"
          (cd apps/horus/dist && sha256sum "horus-${RELEASE_TAG}") \
            > "apps/horus/dist/horus-${RELEASE_TAG}.sha256"

      - name: Write release notes
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          printf '%s\n' \
            "## Install" \
            "" \
            '```bash' \
            "curl -fsSL https://horus.sh/install.sh | bash" \
            '```' \
            "" \
            "## Requirements" \
            "" \
            "- Node.js 22+ (self-contained executable)" \
            "- Python 3.11+ with uv or pip (optional — source-intelligence features)" \
            "" \
            "## Also available via" \
            "" \
            '```bash' \
            "npm install -g @merittdev/horus" \
            "brew install meritt-dev/tap/horus" \
            '```' \
            "" \
            "## Direct download (Linux / macOS)" \
            "" \
            '```bash' \
            "curl -fsSL https://github.com/meritt-dev/horus/releases/download/${RELEASE_TAG}/horus-${RELEASE_TAG} -o horus" \
            "chmod +x horus && sudo mv horus /usr/local/bin/horus" \
            "horus --version" \
            '```' \
            "" \
            "> Note: the single-file direct download has no local persistence (incident memory / \`horus ask\` are display-only). Install via npm or brew for those." \
            > /tmp/release-notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "Horus ${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            "apps/horus/dist/horus-${RELEASE_TAG}" \
            "apps/horus/dist/horus-${RELEASE_TAG}.sha256" \
            "apps/horus/dist/horus_source.whl" \
            ".homebrew-archives/horus-${RELEASE_TAG}-darwin-arm64.tar.gz" \
            ".homebrew-archives/horus-${RELEASE_TAG}-darwin-arm64.tar.gz.sha256" \
            ".homebrew-archives/horus-${RELEASE_TAG}-darwin-x86_64.tar.gz" \
            ".homebrew-archives/horus-${RELEASE_TAG}-darwin-x86_64.tar.gz.sha256" \
            ".homebrew-archives/horus-${RELEASE_TAG}-linux-arm64.tar.gz" \
            ".homebrew-archives/horus-${RELEASE_TAG}-linux-arm64.tar.gz.sha256" \
            ".homebrew-archives/horus-${RELEASE_TAG}-linux-x86_64.tar.gz" \
            ".homebrew-archives/horus-${RELEASE_TAG}-linux-x86_64.tar.gz.sha256"

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        working-directory: apps/horus
        # Idempotent: skip if this version is already on npm (e.g. the separate NPM Publish
        # workflow ran). Without this, a 403 "cannot publish over previous version" fails the
        # whole release and SKIPS the Homebrew formula push, leaving a half-released version.
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@merittdev/horus@${VERSION}" version >/dev/null 2>&1; then
            echo "@merittdev/horus@${VERSION} is already on npm — skipping publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

      - name: Update Homebrew formula
        if: steps.check.outputs.exists == 'false'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: bash ./scripts/homebrew/update-formula.sh "$RELEASE_VERSION"

      - name: Push Homebrew formula to tap
        if: steps.check.outputs.exists == 'false'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/meritt-dev/homebrew-tap.git" \
            /tmp/homebrew-tap
          cp homebrew-tap/Formula/horus.rb /tmp/homebrew-tap/Formula/horus.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/horus.rb
          git diff --cached --quiet \
            || git commit -m "chore: horus ${RELEASE_TAG}"
          git push origin master
