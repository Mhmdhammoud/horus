name: NPM Publish

on:
  # Manual trigger only until the release process is approved.
  # Change to `release: types: [published]` once automated release publishing is wanted.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish with --dry-run instead of publishing"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build CLI package
        run: pnpm --filter ./apps/horus build

      - name: Pack dry-run
        working-directory: apps/horus
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: apps/horus
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
