# Horus dev infrastructure.
# Plain Postgres 16 — NO pgvector in v0 (semantic search is delegated to Axon's
# built-in hybrid search over HTTP/MCP). Redis is intentionally omitted; it is added
# only if/when the investigation engine (HOR-5) needs background jobs.
services:
  postgres:
    image: postgres:16-alpine
    container_name: horus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: horus
      POSTGRES_PASSWORD: horus
      POSTGRES_DB: horus
    ports:
      - "5433:5432"
    volumes:
      - horus_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horus -d horus"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  horus_pg:
